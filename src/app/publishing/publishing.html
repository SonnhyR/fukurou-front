<div style="padding: 3rem 1rem; max-width: 1200px; margin: 0 auto; min-height: 60vh;">
  <div style="text-align: center; margin-bottom: 4rem;">
    <span style="font-size: 4rem; display: block; margin-bottom: 1rem;">📚</span>
    <h1 style="font-family: 'Playfair Display', serif; color: #5D4037; font-size: 2.8rem; margin: 0 0 1rem 0;">Descubre Nuevas Obras</h1>
    <p style="color: #8B7355; font-size: 1.2rem; max-width: 700px; margin: 0 auto;">Navega por miles de libros originales publicados por autores de la comunidad, listos para sumergirte en mundos que desafían tu imaginación.</p>
  </div>
  
  <div style="display: grid; grid-template-columns: 250px 1fr; gap: 2rem;">
    <aside style="background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); height: fit-content;">
      <h3 style="color: #5D4037; margin-top:0;">Filtros</h3>
      <hr style="border:0; height:1px; background:#E0E0E0; margin-bottom: 1rem;">
      <p style="font-weight:bold; color:#795548;">Géneros</p>
      <label style="display:block; margin: 0.5rem 0;"><input type="checkbox" checked> Fantasía Oscura</label>
      <label style="display:block; margin: 0.5rem 0;"><input type="checkbox"> Romance Paranormal</label>
      <label style="display:block; margin: 0.5rem 0;"><input type="checkbox"> Ciencia Ficción</label>
      <label style="display:block; margin: 0.5rem 0;"><input type="checkbox"> Thriller de Misterio</label>
      <p style="font-weight:bold; color:#795548; margin-top: 1.5rem;">Estado</p>
      <label style="display:block; margin: 0.5rem 0;"><input type="radio" name="st"> Completadas</label>
      <label style="display:block; margin: 0.5rem 0;"><input type="radio" name="st" checked> En emisión</label>
    </aside>

    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem;">
      <div style="background: white; border-radius: 12px; padding: 1rem; display: flex; gap: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
        <div style="width: 90px; height: 130px; background: #FF6B6B; border-radius: 8px; flex-shrink: 0;"></div>
        <div>
          <h4 style="margin: 0 0 0.3rem 0; color: #5D4037;">Ecos de Venganza</h4>
          <p style="margin: 0 0 0.5rem 0; font-size: 0.8rem; color: #8B7355;">Por V. Thorne</p>
          <span style="font-size:0.75rem; background: #FFF8F0; color: #FF9800; padding: 0.2rem 0.5rem; border-radius: 4px;">Fantasía Oscura</span>
          <p style="font-size: 0.85rem; margin-top: 0.8rem;">42 Capítulos • 4.8 ⭐</p>
          <button class="btn btn-outline" style="padding: 0.3rem 1rem; font-size: 0.8rem; margin-top: 0.5rem;">Leer Sinopsis</button>
        </div>
      </div>
    </div>
  </div>
</div>
