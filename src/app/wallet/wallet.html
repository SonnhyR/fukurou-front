<div class="wallet-container">
  <div class="wallet-card">
    <div class="wallet-header">
      <div class="wallet-balance">
        <span class="feather-icon">🪶</span>
        <h2>1,250 Feathers</h2>
      </div>
      <p class="wallet-subtitle">Tu saldo disponible</p>
    </div>
    
    <div class="wallet-actions">
      <button class="btn btn-primary btn-recharge" (click)="showDemoToast('Recargar Feathers')">Recargar Feathers</button>
      <button class="btn btn-outline btn-withdraw" (click)="showDemoToast('Retirar Feathers')">Retirar Feathers</button>
    </div>
  </div>
</div>
